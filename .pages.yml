media:
  input: static/uploads
  output: /uploads

content:

  # Noticias #
  - name: news
    label: News
    type: collection
    path: content/blog
    filename: "{year}-{month}-{day}-{primary}.md"
    format: yaml-frontmatter
    fields:
      - { name: title, label: Title, type: string }
      - { name: date, label: Date, type: date }
      - { name: draft, label: Draft, type: boolean, default: false }
      - { name: summary, label: Summary, type: text }
      - { name: image, label: Image, type: image }
      - { name: body, label: Body, type: rich-text }

  # Académicos #
  - name: academicos
    label: Académicos
    type: collection
    path: content/academicos
    filename: "{primary}/_index.md"
    format: yaml-frontmatter
    fields:
      - { name: title, label: Nombre, type: string }
      - { name: role, label: Cargo, type: string }
      - { name: degree, label: Grado, type: string }
      - { name: email, label: Email, type: string }
      - { name: orcid, label: ORCID, type: string, description: "Ej: 0000-0002-1825-0097" }
      - { name: topics, label: Áreas, type: list }
      - { name: image, label: Foto, type: image }
      - name: publicaciones
        label: Publicaciones
        type: list
        fields:
          - { name: titulo, label: Título, type: string }
          - { name: revista, label: Revista, type: string }
          - { name: año, label: Año, type: number }
          - { name: link, label: Link, type: string }
      - name: proyectos
        label: Proyectos
        type: list
        fields:
          - { name: nombre, label: Nombre, type: string }
          - { name: descripcion, label: Descripción, type: text }
          - { name: año, label: Año, type: number }
      - { name: body, label: Contenido, type: rich-text }

  # Laboratorios #
  - name: laboratorios
    label: Laboratorios
    type: collection
    path: content/laboratorios
    filename: "{primary}/_index.md"
    format: yaml-frontmatter
    fields:
      # Identificación
      - { name: title,    label: "Nombre completo del laboratorio", type: string }
      - { name: acronimo, label: "Acrónimo o nombre corto", type: string }
      - { name: summary,  label: "Descripción breve (2-3 líneas)", type: text }
      - { name: image,    label: "Imagen del laboratorio", type: image }
      # Taxonomía
      - name: temas
        label: "Áreas de investigación"
        type: list
        hint: "Escribe un área por línea. Valores posibles: neurobiologia-molecular-celular, neurociencia-computacional-ia, neuromodulacion-control-motor, otoneurologia-audicion, envejecimiento-neurodegeneracion, neurociencia-desarrollo, neuropsicologia-cognicion, neurologia-clinica-traslacional"
      # Directores
      - name: directores
        label: "Directores (IPs)"
        type: list
        fields:
          - { name: name,  label: "Nombre completo",                    type: string }
          - { name: email, label: "Correo electrónico",                  type: string }
          - { name: url,   label: "URL perfil (ej: /academicos/nombre)", type: string }
      # Vínculos y financiamiento
      - { name: sitio_web, label: "Sitio web del lab (URL completa)", type: string }
      - { name: fondecyt,  label: "Proyecto FONDECYT vigente",        type: string }
      # Publicación
      - { name: date,  label: "Fecha",    type: date }
      - { name: draft, label: "Borrador", type: boolean, default: false }
      # Contenido
      - { name: body, label: "Contenido detallado", type: rich-text }

  # Eventos #
  - name: eventos
    label: Eventos
    type: collection
    path: content/eventos
    filename: "{year}-{month}-{day}-{primary}.md"
    format: yaml-frontmatter
    fields:
      - { name: title,   label: Título,    type: string }
      - { name: date,    label: Fecha,     type: date }
      - { name: summary, label: Resumen,   type: text }
      - { name: image,   label: Imagen,    type: image }
      - { name: body,    label: Contenido, type: rich-text }

  # Quiénes somos #
  - name: quienes
    label: Quiénes somos
    type: file
    path: content/quienes/_index.md
    format: yaml-frontmatter
    fields:
      - { name: title, label: Título,    type: string }
      - { name: body,  label: Contenido, type: rich-text }

  # Formación #
  - name: formacion
    label: Formación
    type: file
    path: content/formacion/_index.md
    format: yaml-frontmatter
    fields:
      - { name: title, label: Título,    type: string }
      - { name: body,  label: Contenido, type: rich-text }

  # Contacto #
  - name: contacto
    label: Contacto
    type: file
    path: content/contacto/_index.md
    format: yaml-frontmatter
    fields:
      - { name: title, label: Título,    type: string }
      - { name: body,  label: Contenido, type: rich-text }