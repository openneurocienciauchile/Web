media:
  input: static/uploads
  output: /uploads

content:
  - name: news
    label: News
    type: collection
    path: content/blog
    filename: "{year}-{month}-{day}-{primary}.md"
    format: yaml-frontmatter
    view:
      fields: [title, date, draft]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: date
        label: Date
        type: date
        required: true

      - name: draft
        label: Draft
        type: boolean
        default: false

      - name: summary
        label: Summary
        type: text

      - name: image
        label: Featured image
        type: image
        options:
          path: news
          extensions: [jpg, jpeg, png, webp]

      - name: body
        label: Body
        type: rich-text
        options:
          path: news
          extensions: [jpg, jpeg, png, webp]

  - name: academicos
    label: Académicos
    type: collection
    path: content/academicos
    filename: "{primary}/_index.md"
    format: yaml-frontmatter

    view:
      fields: [title, role]
      primary: title

    fields:
      - name: title
        label: Nombre
        type: string
        required: true

      - name: role
        label: Cargo
        type: string

      - name: degree
        label: Grado
        type: string

      - name: email
        label: Email
        type: string

      - name: summary
        label: Resumen
        type: text

      - name: topics
        label: Áreas
        type: list

      - name: image
        label: Foto
        type: image
        options:
          path: academicos
          extensions: [jpg, jpeg, png, webp]

      - name: body
        label: Contenido
        type: rich-text