media:
  input: static/uploads
  output: /uploads

# ── Definición reutilizable de opciones de temas ──────────────────────────────
# (Pages CMS no soporta anchors YAML nativos, así que repetimos el bloque
#  en cada colección. Copia-pega si añades un nuevo tema.)

content:

# ── Noticias ────────────────────────────────────────────────────────────
  - name: news
    label: Noticias
    type: collection
    path: content/blog
    filename: "index.md"
    format: yaml-frontmatter
    fields:
      - { name: title,    label: "Título",               type: string }
      - { name: subtitle, label: "Subtítulo",             type: string,  description: "Frase breve que aparece bajo el título en la tarjeta" }
      - { name: date,     label: "Fecha",                 type: date }
      - { name: draft,    label: "Borrador",              type: boolean, default: false }
      - { name: summary,  label: "Resumen (SEO/preview)", type: text,    description: "Solo para buscadores. No aparece en la tarjeta." }
      - { name: image,    label: "Imagen de portada",     type: image }
      - name: temas
        label: "Temas"
        type: string
        list: true
        description: "Escribe libremente los temas de la noticia (ej. Audición, Premios, EEG). Aparecen en la nube de Temas."
      - { name: body,     label: "Contenido",             type: rich-text }

  # ── Académicos ────────────────────────────────────────────────────────────
  - name: academicos
    label: Académicos
    type: collection
    path: content/academicos
    filename: "{primary}/index.md"
    format: yaml-frontmatter
    fields:
      - { name: title,  label: Nombre, type: string }
      - { name: role,   label: Cargo,  type: string }
      - { name: degree, label: Grado,  type: string }
      - { name: email,  label: Email,  type: string }
      - { name: orcid,       label: ORCID,                    type: string, description: "Ej: 0000-0002-1825-0097" }
      - { name: portafolio, label: "Portafolio académico UChile", type: string, description: "URL completa, ej: https://portafolio.uchile.cl/perfil/..." }
      # ✅ SELECT MÚLTIPLE: impide crear temas nuevos por error tipográfico
      - name: temas
        label: "Áreas de investigación"
        type: string
        list: true
        description: "Escribe libremente los temas (ej. Tinnitus, Alzheimer, EEG, Coparentalidad). Se crean solos y aparecen en la nube de Temas. Reutiliza los que ya existen para no fragmentar."
      - { name: image, label: Foto, type: image }
      - name: afiliacion
        label: "Centros y afiliación"
        type: list
        description: "Centros, departamentos y laboratorios. Si agregas una URL, el texto queda enlazado (ej. al laboratorio: /laboratorios/lab-once/)."
        fields:
          - { name: texto, label: "Texto", type: string }
          - { name: url,   label: "URL (opcional)", type: string, description: "Ej: /laboratorios/lab-once/  — deja en blanco si no enlaza a nada." }
          - { name: rol,   label: "Rol (opcional)", type: string, description: "Ej: Director, Investigador responsable." }
      - { name: youtube, label: "Video de autopresentación (YouTube)", type: string, description: "URL o ID del video. Se reproduce solo, en silencio y en bucle. Deja en blanco si no hay video." }
      - name: bio
        label: "Biografía"
        type: rich-text
        description: "Presentación del académico/a. Aparece como bloque desplegable en su perfil."
      - name: publicaciones
        label: Publicaciones
        type: list
        fields:
          - { name: titulo,  label: Título,  type: string }
          - { name: revista, label: Revista, type: string }
          - { name: año,     label: Año,     type: number }
          - { name: link,    label: Link,    type: string }
      - name: proyectos
        label: Proyectos
        type: list
        fields:
          - { name: nombre,      label: Nombre,       type: string }
          - { name: descripcion, label: Descripción,  type: text }
          - { name: año,         label: Año,          type: number }
      - { name: body, label: Contenido, type: rich-text }

  # ── Laboratorios ──────────────────────────────────────────────────────────
  - name: laboratorios
    label: Laboratorios
    type: collection
    path: content/laboratorios
    filename: "{primary}/_index.md"
    format: yaml-frontmatter
    fields:
      - { name: title,    label: "Nombre completo del laboratorio", type: string }
      - { name: acronimo, label: "Acrónimo o nombre corto",         type: string }
      - { name: summary,  label: "Descripción breve (2-3 líneas)",  type: text }
      - { name: image,    label: "Imagen del laboratorio",          type: image }
      # ✅ SELECT MÚLTIPLE: misma lógica que en académicos
      - name: temas
        label: "Áreas de investigación"
        type: string
        list: true
        description: "Escribe libremente los temas (ej. Tinnitus, Alzheimer, EEG, Coparentalidad). Se crean solos y aparecen en la nube de Temas. Reutiliza los que ya existen para no fragmentar."
      - name: directores
        label: "Directores (IPs)"
        type: list
        fields:
          - { name: name,  label: "Nombre completo",                    type: string }
          - { name: email, label: "Correo electrónico",                  type: string }
          - { name: url,   label: "URL perfil (ej: /academicos/nombre)", type: string }
      - { name: sitio_web, label: "Sitio web del lab (URL completa)", type: string }
      - { name: fondecyt,  label: "Proyecto FONDECYT vigente",        type: string }
      - { name: date,      label: "Fecha",                            type: date }
      - { name: draft,     label: "Borrador",                         type: boolean, default: false }
      - { name: body,      label: "Contenido detallado",              type: rich-text }

  # ── Eventos ───────────────────────────────────────────────────────────────
  - name: eventos
    label: Eventos
    type: collection
    path: content/eventos
    filename: "{year}-{month}-{day}-{primary}.md"
    format: yaml-frontmatter
    fields:
      - { name: title,       label: "Título interno (para URL)",   type: string }
      - { name: date,        label: "Fecha del evento",            type: date }
      - name: tipo
        label: "Tipo de evento"
        type: select
        options:
          values:
            - seminario
            - evento
        default: seminario
      - { name: afiche,      label: "Afiche (imagen)",             type: image }
      - { name: speaker,     label: "Nombre del expositor/a",      type: string }
      - { name: institucion, label: "Institución del expositor/a", type: string }
      - { name: fecha_hora,  label: "Fecha y hora (texto)",        type: string,  description: "Ej: Martes 24 de junio de 2025, 11:30 - 13:00 hrs" }
      - { name: lugar,       label: "Lugar",                       type: string }
      - { name: zoom_link,   label: "Link Zoom",                   type: string }
      - { name: zoom_id,     label: "ID Zoom",                     type: string }
      - { name: zoom_pass,   label: "Contraseña Zoom",             type: string }
      - { name: summary,     label: "Resumen breve (SEO)",         type: text }
      # ✅ SELECT MÚLTIPLE: misma lógica
      - name: temas
        label: "Temas"
        type: string
        list: true
        description: "Escribe libremente los temas (ej. Tinnitus, Alzheimer, EEG, Coparentalidad). Se crean solos y aparecen en la nube de Temas. Reutiliza los que ya existen para no fragmentar."
      - { name: body, label: "Descripción completa", type: rich-text }

  # ── Temas ─────────────────────────────────────────────────────────────────
  - name: temas
    label: Temas
    type: collection
    path: content/temas
    filename: "{primary}/_index.md"
    format: yaml-frontmatter
    fields:
      - { name: title,   label: "Nombre del tema (se muestra en la página)", type: string }
      - { name: summary, label: "Descripción breve (aparece en la lista de temas)", type: text }
      - { name: weight,  label: "Orden (número menor = primero en la lista)", type: number }
      - name: body
        label: "Descripción larga (opcional)"
        type: rich-text
        description: "Si se completa, aparece al inicio de la página del tema antes de los contenidos relacionados."

  # ── Quiénes somos ─────────────────────────────────────────────────────────
  - name: quienes
    label: Quiénes somos
    type: file
    path: content/quienes-somos/_index.md
    format: yaml-frontmatter
    fields:
      - { name: title, label: Título de la página, type: string }
      - name: sections
        label: Secciones
        type: list
        fields:
          - name: content
            label: Contenido
            type: object
            fields:
              - { name: image,     label: "Imagen principal",                                                    type: image }
              - { name: image_alt, label: "Texto alternativo de la imagen (accesibilidad)",                      type: string }
              - { name: title,     label: "Título del bloque",                                                   type: string }
              - { name: subtitle,  label: "Subtítulo (ej: Facultad de Medicina · Universidad de Chile)",         type: string }
              - { name: text,      label: "Texto principal",                                                     type: rich-text }
              - { name: missions_title, label: "Encabezado de la lista de misiones",                             type: string }
              - name: missions
                label: Misiones
                type: list
                description: "Una misión por línea."

  # ── Formación ─────────────────────────────────────────────────────────────
  - name: formacion
    label: Formación
    type: file
    path: content/formacion/_index.md
    format: yaml-frontmatter
    fields:
      - { name: title, label: Título,    type: string }
      - { name: body,  label: Contenido, type: rich-text }

  # ── Contacto ──────────────────────────────────────────────────────────────
  - name: contacto
    label: Contacto
    type: file
    path: content/contacto/_index.md
    format: yaml-frontmatter
    fields:
      - { name: title, label: Título,    type: string }
      - { name: body,  label: Contenido, type: rich-text }