<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ .Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{ partial "css.html" . }}
</head>

<body>

<div class="container mx-auto px-6 py-10">

  <h1 style="color:red;">FUNCIONA</h1>

  <div class="grid grid-cols-3 gap-10">

    <!-- IZQUIERDA -->
    <div class="col-span-1">
      <div class="bg-white shadow rounded-lg p-6 sticky top-10">

        {{ $page := . }}

        {{ with .Params.image.filename }}
        <img src="{{ printf "%s/%s" $page.RelPermalink . }}" 
       class="w-full h-56 object-cover rounded mb-4">
        {{ end }}

        <h1 class="text-2xl font-bold mb-2">{{ .Title }}</h1>

        {{ with .Params.role }}
          <p>{{ . }}</p>
        {{ end }}

        {{ with .Params.degree }}
          <p>{{ . }}</p>
        {{ end }}

        {{ with .Params.email }}
          <p>{{ . }}</p>
        {{ end }}

      </div>
    </div>

    <!-- DERECHA -->
    <div class="col-span-2">
      <div class="prose max-w-none">
        {{ .Content }}
      </div>
    </div>

  </div>

</div>

</body>
</html>
