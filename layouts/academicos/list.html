{{ define "main" }}

<section class="page-academicos w-full">

  <div class="container mx-auto px-6 py-12">

    <!-- Título -->
    <h1 class="text-3xl font-bold mb-10">
      Académicos
    </h1>

    <!-- Grid -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">

      {{ range .RegularPages }}

        <a href="{{ .RelPermalink }}" class="group">

          <div class="bg-white/80 border border-gray-200 rounded-lg shadow hover:shadow-lg transition overflow-hidden">

            <!-- Imagen -->
            {{ with .Params.image }}
  <img src="{{ printf "%s%s" site.BaseURL . }}" 
       class="w-full h-64 object-cover rounded mb-4">
{{ end }}

            <!-- Nombre -->
            <div class="p-4 text-center">
              <h2 class="text-lg font-semibold">
                {{ .Title }}
              </h2>

              <!-- Cargo -->
              {{ with .Params.role }}
                <p class="text-sm text-gray-500">
                  {{ . }}
                </p>
              {{ end }}
            </div>

          </div>

        </a>

      {{ end }}

    </div>

  </div>

</section>

{{ end }}
