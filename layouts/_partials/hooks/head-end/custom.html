{{/* ── Hero: red neuronal animada + aparición al scroll ── */}}
<script>
(function () {
  function showAll(){ document.querySelectorAll('.rv').forEach(function(el){ el.classList.add('in'); }); }
  function init(){
    try {
      document.documentElement.classList.add('js');
      if ('IntersectionObserver' in window) {
        var io = new IntersectionObserver(function (es) {
          es.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
        }, { threshold: .12 });
        document.querySelectorAll('.rv').forEach(function (el, i) {
          el.style.transitionDelay = ((i % 6) * 70) + 'ms'; io.observe(el);
        });
      } else { showAll(); }

      var cv = document.getElementById('net');
      if (cv) {
        var ctx = cv.getContext('2d'), w, h, pts, dpr = window.devicePixelRatio || 1, count = 70,
            col = 'rgba(150,200,255,';
        function size(){
          w = cv.width = cv.offsetWidth * dpr; h = cv.height = cv.offsetHeight * dpr; pts = [];
          for (var i = 0; i < count; i++) pts.push({
            x: Math.random()*w, y: Math.random()*h,
            vx:(Math.random()-.5)*.18*dpr, vy:(Math.random()-.5)*.18*dpr,
            r:(Math.random()*1.6+1)*dpr });
        }
        size(); window.addEventListener('resize', size);
        (function loop(){
          ctx.clearRect(0,0,w,h);
          for (var i=0;i<pts.length;i++){ var p=pts[i]; p.x+=p.vx; p.y+=p.vy;
            if(p.x<0||p.x>w)p.vx*=-1; if(p.y<0||p.y>h)p.vy*=-1;
            for(var j=i+1;j<pts.length;j++){ var q=pts[j],dx=p.x-q.x,dy=p.y-q.y,
              d=Math.sqrt(dx*dx+dy*dy),max=150*dpr;
              if(d<max){ ctx.strokeStyle=col+((1-d/max)*.6)+')'; ctx.lineWidth=dpr*.6;
                ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke(); } }
            ctx.fillStyle=col+'.95)'; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }
          requestAnimationFrame(loop);
        })();
      }
    } catch (e) { showAll(); }
  }
  if (document.readyState !== 'loading') init();
  else document.addEventListener('DOMContentLoaded', init);
})();
</script>
