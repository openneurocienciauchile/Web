{{/* Blox personalizado: news-grid */}}

{{ $posts := where site.RegularPages "Section" "blog" }}

<section style="padding:3rem 0;">
  <div class="container mx-auto px-6">

    <h2 style="font-size:1.75rem; font-weight:700; color:#1a1a2e; margin:0 0 2rem;">
      Últimas Noticias
    </h2>

    <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:1.5rem;">
      {{ range first 4 $posts }}
        {{ partial "news-card.html" . }}
      {{ end }}
    </div>

    <div style="margin-top:2rem; text-align:right;">
      <a href="{{ site.BaseURL }}blog/"
         style="font-size:0.9rem; color:#1565C0; text-decoration:none; font-weight:500;">
        Ver todas las noticias →
      </a>
    </div>

  </div>
</section>
