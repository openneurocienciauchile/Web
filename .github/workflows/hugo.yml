name: Deploy Hugo site to Pages

on:
  # push:  # DESACTIVADO (tarea 7): deploy.yml es el unico deployer y corre el paso de
  #   branches:  # Pagefind. Dos workflows desplegaban a Pages y competian por el grupo
  #     - main   # 'pages'; si ganaba hugo.yml el sitio quedaba sin indice y el buscador
  #              # se rompia. Se deja solo workflow_dispatch (manual).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.153.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Install pnpm dependencies
        run: "[[ -f pnpm-lock.yaml ]] && corepack enable && pnpm install --frozen-lockfile || true"

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: /tmp/hugo_cache
        run: |
          hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
